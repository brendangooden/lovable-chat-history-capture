# Example workflow — copy to `.github/workflows/chat-history.yml` in your own
# repo to get a daily Lovable chat history export committed to that repo.
#
# Required repo secrets:
#   LOVABLE_FIREBASE_API_KEY
#   LOVABLE_REFRESH_TOKEN
#   LOVABLE_PROJECT_ID
#   LOVABLE_FIRESTORE_PROJECT
#
# See https://github.com/brendangooden/lovable-chat-history-capture#readme
# for how to extract these from your browser's IndexedDB.
name: Chat history sync

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chat-history-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Export Lovable chat history
        uses: brendangooden/lovable-chat-history-capture@v1
        with:
          api_key: ${{ secrets.LOVABLE_FIREBASE_API_KEY }}
          refresh_token: ${{ secrets.LOVABLE_REFRESH_TOKEN }}
          project_id: ${{ secrets.LOVABLE_PROJECT_ID }}
          firestore_project: ${{ secrets.LOVABLE_FIRESTORE_PROJECT }}
          output_dir: chat-history

      - name: Commit & push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add chat-history
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chat-history: sync $(date -u +%Y-%m-%d)"
          git push
